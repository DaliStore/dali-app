<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE App</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ (СТИЛЬ DaLi) */
        :root {
            --gold: #d4af37;
            --bg: #050505;
            --card-bg: #111111;
            --text-gray: #888;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* КОНТЕЙНЕР ЭКРАНОВ */
        .screen {
            display: none; /* Прячем все экраны по умолчанию */
            padding: 20px;
            padding-bottom: 90px; /* Отступ под меню */
        }

        .screen.active {
            display: block; /* Показываем только активный */
        }

        /* НИЖНЕЕ МЕНЮ (NAVBAR) */
        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 10px;
            text-decoration: none;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item i {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1>DaLi STORE</h1>
        <div style="height: 200px; background: #1a1a1a; border-radius: 20px; margin-top: 20px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold);">
            Здесь будет твой баннер
        </div>
        <p style="text-align: center; margin-top: 20px;">Добро пожаловать в элитное комьюнити.</p>
    </div>

    <div id="screen-catalog" class="screen">
        <h1>КАТАЛОГ</h1>
        <p style="text-align: center; color: var(--text-gray);">Выберите свой стиль</p>
        </div>

    <div id="screen-cart" class="screen">
        <h1>КОРЗИНА</h1>
        <p style="text-align: center;">Пока пусто...</p>
    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="openScreen('home', this)">
            <i>🏠</i>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="openScreen('catalog', this)">
            <i>🛍️</i>
            <span>Каталог</span>
        </div>
        <div class="nav-item" onclick="openScreen('cart', this)">
            <i>🛒</i>
            <span>Корзина</span>
        </div>
    </nav>

    <script>
        // ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ЭКРАНОВ
        function openScreen(screenName, element) {
            // 1. Прячем все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // 2. Снимаем активный класс со всех иконок
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // 3. Показываем нужный экран
            document.getElementById('screen-' + screenName).classList.add('active');
            // 4. Делаем иконку активной
            element.classList.add('active');
        }
    </script>
</body>
</html>
