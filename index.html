<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dali Store - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --main-gold: #D4AF37;
            --text-gray: #777;
            --card-bg: #0d0d0d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Навигация сверху как на скринах */
        .app-header {
            padding: 15px; text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }
        .app-header h1 { 
            color: var(--main-gold); font-size: 18px; 
            margin: 0; letter-spacing: 3px; text-transform: uppercase;
        }

        .container {
            height: calc(100vh - 140px);
            overflow-y: auto;
            padding: 15px;
        }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .product-img {
            width: 100%; height: 250px;
            background: #111;
            display: flex; align-items: center; justify-content: center;
            color: #333; font-weight: bold;
        }
        .product-info { padding: 15px; }
        .product-title { font-size: 16px; margin: 0 0 5px 0; color: var(--main-gold); }
        .product-price { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

        .product-controls {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px;
        }
        .qty-controls {
            display: flex; align-items: center; background: #1a1a1a;
            border-radius: 8px; padding: 5px;
        }
        .qty-btn {
            background: none; border: none; color: #fff;
            font-size: 20px; width: 30px; cursor: pointer;
        }
        .qty-num { width: 30px; text-align: center; font-weight: bold; }

        .buy-btn {
            flex-grow: 1;
            background: var(--main-gold);
            color: #000; border: none;
            padding: 12px; border-radius: 8px;
            font-weight: bold; text-transform: uppercase; font-size: 12px;
        }

        /* ПРОФИЛЬ */
        .profile-card {
            background: var(--card-bg); border: 1px solid #1a1a1a;
            border-radius: 15px; padding: 20px; text-align: center;
        }
        .user-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--main-gold); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000; overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* ТАБ-БАР (НИЗ) */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #0a0a0a; border-top: 1px solid #1a1a1a;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-gray); font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--main-gold); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* КОРЗИНА */
        .cart-item {
            background: var(--card-bg); padding: 15px;
            border-radius: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .empty-cart { text-align: center; color: var(--text-gray); margin-top: 50px; }
        .order-btn {
            background: var(--main-gold); color: #000;
            width: 100%; padding: 15px; border-radius: 10px;
            border: none; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>Dali Store</h1>
</div>

<div class="container" id="scroll-area">
    <div id="catalog" class="screen active">
        <div id="product-list">
            </div>
    </div>

    <div id="cart" class="screen">
        <h2 style="text-align: right; margin-bottom: 20px;">Корзина</h2>
        <div id="cart-content"></div>
    </div>

    <div id="profile" class="screen">
        <h2 style="text-align: center; margin-bottom: 20px;">ПРОФИЛЬ</h2>
        <div class="profile-card">
            <div id="user-photo" class="user-avatar">?</div>
            <div id="user-name" style="font-size: 18px; font-weight: bold;">User Name</div>
            <p id="user-handle" style="color: var(--text-gray); font-size: 14px;">@username</p>
        </div>
        <div style="margin-top: 30px;">
            <div style="background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                История заказов
                <p style="font-size: 12px; color: var(--text-gray); margin: 5px 0 0;">Заказов пока нет</p>
            </div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="show('catalog', this)">
        <span class="nav-icon">🏠</span>
        <span>Главная</span>
    </div>
    <div class="nav-item" onclick="show('cart', this)">
        <span class="nav-icon">🛍️</span>
        <span>Каталог</span>
    </div>
    <div class="nav-item" onclick="show('cart', this)">
        <span class="nav-icon">🛒</span>
        <span>Корзина</span>
    </div>
    <div class="nav-item" onclick="show('profile', this)">
        <span class="nav-icon">👤</span>
        <span>Профиль</span>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#050505';

    let cart = [];
    const products = [
        { id: 1, name: "Premium T-Shirt", price: 3500 },
        { id: 2, name: "Dali Hoodie", price: 6200 },
        { id: 3, name: "Zip Hoodie", price: 7500 }
    ];

    // Инициализация профиля из данных Telegram
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        document.getElementById('user-name').innerText = `${user.first_name} ${user.last_name || ''}`;
        document.getElementById('user-handle').innerText = `@${user.username || 'unknown'}`;
        if (user.photo_url) {
            document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}">`;
        }
    }

    function renderCatalog() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-img">PHOTO</div>
                <div class="product-info">
                    <h3 class="product-title">${p.name}</h3>
                    <div class="product-price">${p.price} ₽</div>
                    <div class="product-controls">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
                            <span class="qty-num">1</span>
                            <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
                        </div>
                        <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price}, this)">Добавить</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeQty(btn, delta) {
        let s = btn.parentElement.querySelector('.qty-num');
        let v = parseInt(s.innerText) + delta;
        if (v > 0) {
            s.innerText = v;
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function addToCart(name, price, btn) {
        let q = parseInt(btn.parentElement.querySelector('.qty-num').innerText);
        cart.push({ name, price, q });
        tg.HapticFeedback.notificationOccurred('success');
        
        const originalText = btn.innerText;
        btn.innerText = 'ДОБАВЛЕНО';
        btn.style.background = '#fff';
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = 'var(--main-gold)';
        }, 1000);
    }

    function renderCart() {
        let c = document.getElementById('cart-content');
        if (cart.length === 0) {
            c.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            return;
        }
        let total = cart.reduce((sum, item) => sum + (item.price * item.q), 0);
        c.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div><b>${i.name}</b><br><small>${i.q} шт.</small></div>
                <div>${i.price * i.q} ₽</div>
            </div>
        `).join('') + `
            <h2 style="text-align:right; margin-top:20px;">Итого: ${total} ₽</h2>
            <button class="order-btn" onclick="sendOrder()">ОФОРМИТЬ ЗАКАЗ</button>
        `;
    }

    function show(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        
        if (id === 'cart') renderCart();
        tg.HapticFeedback.selectionChanged();
    }

    function sendOrder() {
        tg.sendData(JSON.stringify(cart));
        tg.close();
    }

    renderCatalog();
</script>

</body>
</html>
