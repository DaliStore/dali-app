<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI ESSENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh;
        }

        /* ТВОЙ ЖИВОЙ ФОН (БЕЗ ЧЕРНЫХ ПЯТЕН) */
        .main-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden;
        }
        .gradient-sphere {
            position: absolute; width: 150vw; height: 150vw; border-radius: 50%;
            filter: blur(80px); opacity: 0.15; z-index: 1;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            animation: move 15s infinite alternate ease-in-out;
        }
        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(10%, 10%); } }

        /* ЦЕНТРАЛЬНЫЙ БЛОК */
        .hero {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; padding-top: 15vh;
            height: 100vh;
        }

        /* НОВЫЙ МОЩНЫЙ ГЛИТЧ */
        .dali-title {
            font-size: 42px; /* Больше и мощнее */
            font-weight: 900;
            letter-spacing: -1px;
            position: relative;
            color: #fff;
            text-align: center;
            /* Убираем любые фоны, оставляем чистый текст */
            background: none;
        }

        .dali-title::before, .dali-title::after {
            content: 'DALI ESSENCE';
            position: absolute; top: 0; left: 0; width: 100%;
            opacity: 0.7;
        }

        /* Эффект расслоения (RGB Shift) без черного фона */
        .dali-title::before {
            color: #ff003c;
            z-index: -1;
            animation: glitch-v2 0.4s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        .dali-title::after {
            color: #00f0ff;
            z-index: -2;
            animation: glitch-v2 0.4s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
        }

        @keyframes glitch-v2 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }

        .protocol {
            font-size: 9px; color: var(--gold);
            letter-spacing: 4px; margin-top: 20px;
            opacity: 0.6; font-weight: 400;
        }

        /* МИНИ-ВКЛАДКИ */
        .nav { 
            position: fixed; bottom: 30px; left: 10%; right: 10%;
            height: 55px; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { font-size: 8px; color: #555; font-weight: 700; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

<div class="main-background">
    <div class="gradient-sphere"></div>
</div>

<div class="hero">
    <h1 class="dali-title">DALI ESSENCE</h1>
    <div class="protocol">SYSTEM PROTOCOL V1.0</div>
</div>

<nav class="nav">
    <div class="nav-item active">HOME</div>
    <div class="nav-item">SHOP</div>
    <div class="nav-item">BAG</div>
    <div class="nav-item">ID</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#000000';
</script>
</body>
</html>
