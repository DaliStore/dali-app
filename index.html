<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI ESSENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh;
            user-select: none;
        }

        /* ЖИВОЙ ФОН */
        .main-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .gradient-sphere {
            position: absolute; width: 140vw; height: 140vw; border-radius: 50%;
            filter: blur(80px); opacity: 0.12; z-index: 1;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            animation: slowMove 20s infinite alternate ease-in-out;
        }
        @keyframes slowMove { from { transform: translate(-20%, -10%); } to { transform: translate(10%, 15%); } }

        /* ЭФФЕКТ КАСАНИЯ (РИППЛ) */
        .touch-hint {
            position: absolute; width: 50px; height: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%; pointer-events: none;
            opacity: 0; z-index: 50;
        }
        @keyframes hint-anim {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* КОНТЕНТ */
        .hero {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; padding-top: 18vh;
            height: 100vh; width: 100%;
        }

        /* РЕДКИЙ ГЛИТЧ НА МАССИВНОМ ШРИФТЕ */
        .dali-title {
            font-size: 38px; font-weight: 900; letter-spacing: -1px;
            position: relative; color: #fff; text-align: center;
            background: none;
        }

        /* Слои для редкого глитча */
        .dali-title::before, .dali-title::after {
            content: 'DALI ESSENCE';
            position: absolute; top: 0; left: 0; width: 100%;
            opacity: 0; /* Скрыты по умолчанию */
        }

        /* Анимация: глитч срабатывает редко (пауза 5 сек, всплеск 0.2 сек) */
        .dali-title::before {
            color: #ff003c; z-index: -1;
            animation: rare-glitch 6s infinite;
        }
        .dali-title::after {
            color: #00f0ff; z-index: -2;
            animation: rare-glitch 6s infinite 0.1s;
        }

        @keyframes rare-glitch {
            0%, 94%, 100% { opacity: 0; transform: translate(0); }
            95% { opacity: 0.8; transform: translate(-5px, 2px); clip-path: inset(10% 0 40% 0); }
            97% { opacity: 0.8; transform: translate(5px, -2px); clip-path: inset(50% 0 10% 0); }
            99% { opacity: 0.5; transform: translate(-2px, 3px); }
        }

        .protocol {
            font-size: 8px; color: var(--gold);
            letter-spacing: 5px; margin-top: 15px;
            opacity: 0.5; font-weight: 400;
        }

        /* МИНИ-ВКЛАДКИ */
        .nav { 
            position: fixed; bottom: 30px; left: 10%; right: 10%;
            height: 60px; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px); border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { font-size: 7px; color: #444; font-weight: 800; letter-spacing: 1px; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body ontouchstart="handleTouch(event)">

<div class="main-background">
    <div class="gradient-sphere"></div>
</div>

<div class="hero">
    <h1 class="dali-title">DALI ESSENCE</h1>
    <div class="protocol">SYSTEM PROTOCOL V1.0</div>
</div>

<nav class="nav">
    <div class="nav-item active">HOME</div>
    <div class="nav-item">SHOP</div>
    <div class="nav-item">BAG</div>
    <div class="nav-item">ID</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Функция отклика на нажатие
    function handleTouch(e) {
        const touch = e.touches[0];
        const hint = document.createElement('div');
        hint.className = 'touch-hint';
        hint.style.left = `${touch.clientX - 25}px`;
        hint.style.top = `${touch.clientY - 25}px`;
        hint.style.animation = 'hint-anim 0.5s ease-out forwards';
        
        document.body.appendChild(hint);
        
        // Вибрация Telegram
        tg.HapticFeedback.impactOccurred('light');

        setTimeout(() => hint.remove(), 500);
    }
</script>
</body>
</html>
