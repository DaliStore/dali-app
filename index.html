<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI SYSTEM — LUXURY DROP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --bg: #000; --dim: #555; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--accent); 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
            text-transform: uppercase;
        }

        #app { height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* ФОН С ОПТИМИЗАЦИЕЙ */
        .main-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-sphere {
            position: absolute;
            width: 120vw;
            height: 120vw;
            border-radius: 50%;
            filter: blur(60px); /* Уменьшил блюр для производительности */
            opacity: 0.15;
            z-index: 1;
            will-change: transform; /* Подсказка браузеру для плавности */
        }

        .sphere-1 {
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            top: -20%; left: -20%;
        }

        .sphere-2 {
            background: radial-gradient(circle, #333 0%, transparent 70%);
            bottom: -20%; right: -20%;
        }

        /* ЛЕГКОЕ КАСАНИЕ (РИППЛ) */
        .touch-hint {
            position: absolute;
            width: 40px; height: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
            transform: scale(1);
        }

        @keyframes hint-anim {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        /* КОНТЕНТ */
        .view { 
            position: relative;
            z-index: 10;
            flex: 1; overflow-y: auto; display: none; 
            padding: 20px;
        }
        .view.active { display: flex; flex-direction: column; }

        .status-badge { 
            align-self: flex-end;
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.03); padding: 10px 16px; 
            border-radius: 30px; border: 1px solid rgba(0,255,0,0.2);
            backdrop-filter: blur(10px);
        }
        .dot { width: 6px; height: 6px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; }

        /* NAV */
        .nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: rgba(10,10,10,0.6); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--dim); font-size: 8px; font-weight: 800; }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="app" ontouchstart="showHint(event)">
    <div class="main-background">
        <div class="gradient-sphere sphere-1" id="s1"></div>
        <div class="gradient-sphere sphere-2" id="s2"></div>
        <div class="noise"></div>
    </div>

    <div id="view-home" class="view active" onscroll="syncScroll(this)">
        <div class="status-badge">
            <div class="dot"></div>
            <span style="font-size: 8px; color: #00ff00; font-weight: 900; letter-spacing: 1px;">SYSTEM ONLINE</span>
        </div>
        <div style="height: 150vh;"></div> </div>

    <div id="view-shop" class="view"></div>
    <div id="view-cart" class="view"></div>
    <div id="view-profile" class="view"></div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchView('home', this)"><span class="nav-icon">🏠</span>HOME</div>
        <div class="nav-item" onclick="switchView('shop', this)"><span class="nav-icon">🛍️</span>SHOP</div>
        <div class="nav-item" onclick="switchView('cart', this)"><span class="nav-icon">🛒</span>BAG</div>
        <div class="nav-item" onclick="switchView('profile', this)"><span class="nav-icon">👤</span>ID</div>
    </nav>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const s1 = document.getElementById('s1');
    const s2 = document.getElementById('s2');

    // Плавный параллакс без зависаний
    function syncScroll(el) {
        const top = el.scrollTop;
        requestAnimationFrame(() => {
            s1.style.transform = `translate3d(0, ${top * 0.2}px, 0)`;
            s2.style.transform = `translate3d(0, ${-top * 0.1}px, 0)`;
        });
    }

    // Легкая реакция на касание
    function showHint(e) {
        const touch = e.touches[0];
        const hint = document.createElement('div');
        hint.className = 'touch-hint';
        hint.style.left = `${touch.clientX - 20}px`;
        hint.style.top = `${touch.clientY - 20}px`;
        hint.style.animation = 'hint-anim 0.5s ease-out forwards';
        
        document.body.appendChild(hint);
        
        tg.HapticFeedback.impactOccurred('light');

        setTimeout(() => hint.remove(), 500);
    }

    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }
</script>
</body>
</html>
