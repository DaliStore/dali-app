<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI ESSENCE — SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --bg: #000; --gold: #d4af37; --red: #ff003c; --blue: #00f0ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--accent); 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
            text-transform: uppercase;
        }

        /* ФОН С ПАРАЛЛАКСОМ */
        .main-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .gradient-sphere {
            position: absolute; width: 130vw; height: 130vw; border-radius: 50%;
            filter: blur(80px); opacity: 0.15; z-index: 1; will-change: transform;
        }
        .sphere-1 { background: radial-gradient(circle, var(--gold) 0%, transparent 70%); top: -30%; left: -30%; }
        .sphere-2 { background: radial-gradient(circle, #333 0%, transparent 70%); bottom: -30%; right: -30%; }
        .noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; z-index: 2; pointer-events: none; }

        /* ЭФФЕКТ ИЗ ПИНТЕРЕСТА: SLICE GLITCH */
        .hero-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; z-index: 10; height: 100vh;
        }

        .glitch-box {
            position: relative;
            font-size: 52px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
        }

        /* Основной текст */
        .glitch-text {
            position: relative;
            color: #fff;
            animation: glitch-main 4s infinite;
        }

        /* Слои для нарезки (псевдоэлементы) */
        .glitch-text::before,
        .glitch-text::after {
            content: 'DALI ESSENCE';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            clip: rect(0, 0, 0, 0); /* Скрываем изначально */
        }

        /* Красный слой со смещением вверх-влево */
        .glitch-text::before {
            left: 3px;
            text-shadow: -2px 0 var(--red);
            animation: glitch-slice-1 2s infinite linear alternate-reverse;
        }

        /* Синий слой со смещением вниз-вправо */
        .glitch-text::after {
            left: -3px;
            text-shadow: 2px 0 var(--blue);
            animation: glitch-slice-2 3s infinite linear alternate-reverse;
        }

        /* Линия сканирования */
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 15;
            pointer-events: none;
            animation: scan 2s linear infinite;
        }

        /* АНИМАЦИИ КУСКОВ ТЕКСТА (SLICE) */
        @keyframes glitch-slice-1 {
            0% { clip: rect(10px, 9999px, 20px, 0); transform: translateX(-5px); }
            20% { clip: rect(30px, 9999px, 40px, 0); transform: translateX(5px); }
            40% { clip: rect(50px, 9999px, 60px, 0); transform: translateX(-10px); }
            60% { clip: rect(70px, 9999px, 80px, 0); transform: translateX(10px); }
            80% { clip: rect(20px, 9999px, 90px, 0); transform: translateX(-5px); }
            100% { clip: rect(40px, 9999px, 10px, 0); transform: translateX(0); }
        }

        @keyframes glitch-slice-2 {
            0% { clip: rect(80px, 9999px, 90px, 0); transform: translateX(5px); }
            25% { clip: rect(10px, 9999px, 30px, 0); transform: translateX(-5px); }
            50% { clip: rect(40px, 9999px, 50px, 0); transform: translateX(10px); }
            75% { clip: rect(60px, 9999px, 70px, 0); transform: translateX(-10px); }
            100% { clip: rect(20px, 9999px, 40px, 0); transform: translateX(0); }
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* NAV */
        .nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: rgba(10,10,10,0.7); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-radius: 25px; border: 1px solid rgba(255,255,255,0.06); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #333; font-size: 8px; font-weight: 800; letter-spacing: 1px; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

<div id="app">
    <div class="main-background">
        <div class="gradient-sphere sphere-1" id="s1"></div>
        <div class="gradient-sphere sphere-2" id="s2"></div>
        <div class="noise"></div>
    </div>

    <div class="hero-container">
        <div class="glitch-box">
            <div class="scanline"></div>
            <h1 class="glitch-text">DALI ESSENCE</h1>
        </div>
        <p style="font-size: 8px; color: #444; margin-top: 40px; letter-spacing: 6px; font-weight: 400; opacity: 0.6;">DALI SYSTEM PROTOCOL V1.0</p>
    </div>

    <nav class="nav">
        <div class="nav-item active">🏠 HOME</div>
        <div class="nav-item">🛍️ SHOP</div>
        <div class="nav-item">🛒 BAG</div>
        <div class="nav-item">👤 ID</div>
    </nav>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#000000';

    const s1 = document.getElementById('s1');
    const s2 = document.getElementById('s2');

    // Параллакс
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const x = touch.clientX / window.innerWidth;
        const y = touch.clientY / window.innerHeight;
        requestAnimationFrame(() => {
            s1.style.transform = `translate3d(${x * 30}px, ${y * 30}px, 0)`;
            s2.style.transform = `translate3d(${-x * 45}px, ${-y * 45}px, 0)`;
        });
    });
</script>
</body>
</html>
