<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI SYSTEM — BEAST MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --bg: #000; --card: #0a0a0a; --dim: #555; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--accent); 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
            text-transform: uppercase;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        #app { height: 100vh; display: flex; flex-direction: column; }
        .view { 
            flex: 1; overflow-y: auto; display: none; 
            padding: 20px; padding-bottom: 100px;
            animation: fadeIn 0.3s ease;
        }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ЧЕКЕР КОРЗИНЫ (БАДЖ) */
        .cart-badge {
            position: absolute; top: -5px; right: -10px;
            background: var(--gold); color: #000;
            font-size: 10px; font-weight: 900;
            padding: 2px 6px; border-radius: 10px;
        }

        /* HEADER */
        .header { text-align: center; padding: 20px 0; letter-spacing: 5px; border-bottom: 1px solid #111; }
        .header h1 { font-size: 14px; margin: 0; font-weight: 900; }

        /* КАРТОЧКИ ТОВАРОВ */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: var(--card); border-radius: 8px; overflow: hidden; }
        .p-img { width: 100%; aspect-ratio: 1/1; background: #111; position: relative; }
        .p-img::after { content: 'DALI'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #222; font-weight: 900; letter-spacing: 5px; }
        .p-info { padding: 12px; }
        .p-title { font-size: 10px; font-weight: 700; margin-bottom: 5px; height: 25px; }
        .p-price { font-size: 12px; color: var(--dim); margin-bottom: 10px; }
        .p-add { 
            width: 100%; border: 1px solid #333; background: transparent; 
            color: #fff; padding: 10px; font-size: 10px; font-weight: 900;
            border-radius: 4px; transition: 0.2s;
        }
        .p-add:active { background: #fff; color: #000; }

        /* КОРЗИНА */
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #111;
        }
        .cart-total { margin-top: 30px; border-top: 2px solid #fff; padding-top: 20px; }
        .btn-main { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 20px; font-weight: 900; border-radius: 4px; margin-top: 20px;
        }

        /* ПРОФИЛЬ */
        .profile-header { text-align: center; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; background: #111; border-radius: 50%; margin: 0 auto 15px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .user-info { background: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 10px; }
        .info-label { font-size: 9px; color: var(--dim); margin-bottom: 5px; }
        .info-val { font-size: 14px; font-weight: 700; }

        /* НАВИГАЦИЯ */
        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #111; z-index: 1000;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--dim); text-decoration: none; font-size: 8px; font-weight: 700;
            position: relative;
        }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header"><h1>DALI SYSTEM</h1></div>

    <div id="view-shop" class="view active">
        <div style="margin-bottom: 20px;">
            <h2 style="font-size: 24px; font-weight: 900; margin: 0;">NEW DROP</h2>
            <p style="font-size: 9px; color: var(--dim); letter-spacing: 2px;">Spring 2026 Collection</p>
        </div>
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <div id="view-cart" class="view">
        <h2 style="font-weight: 900;">YOUR CART</h2>
        <div id="cart-content">
            </div>
        <div id="cart-empty" style="text-align: center; color: var(--dim); margin-top: 100px;">
            <p>CART IS EMPTY</p>
        </div>
        <div id="cart-summary" class="cart-total" style="display: none;">
            <div style="display: flex; justify-content: space-between;">
                <span>TOTAL:</span>
                <span id="total-amount" style="font-weight: 900;">0 ₽</span>
            </div>
            <button class="btn-main" onclick="checkout()">ORDER NOW</button>
        </div>
    </div>

    <div id="view-account" class="view">
        <div class="profile-header">
            <div class="avatar">👤</div>
            <h3 id="user-name">DALI MEMBER</h3>
            <p style="font-size: 9px; color: var(--gold);">PREMIUM ACCESS</p>
        </div>
        
        <div class="user-info">
            <div class="info-label">DISCIPLINE STREAK</div>
            <div class="info-val">53 DAYS</div>
        </div>
        <div class="user-info">
            <div class="info-label">SMC STATUS</div>
            <div class="info-val">MASTER TRADER</div>
        </div>
        <div class="user-info">
            <div class="info-label">HEIGHT / WEIGHT</div>
            <div class="info-val">194 CM / 78 KG</div>
        </div>
        
        <button class="btn-main" style="background: transparent; border: 1px solid #333; color: #fff;" onclick="tg.close()">LOGOUT</button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchView('shop', this)">
            <span class="nav-icon">⬛</span>SHOP
        </div>
        <div class="nav-item" onclick="switchView('cart', this)">
            <span class="nav-icon">⚪</span>CART
            <span id="cart-count-badge" class="cart-badge" style="display: none;">0</span>
        </div>
        <div class="nav-item" onclick="switchView('account', this)">
            <span class="nav-icon">◼️</span>ID
        </div>
    </nav>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#000000';
    tg.backgroundColor = '#000000';

    // ДАННЫЕ ТОВАРОВ
    const products = [
        { id: 1, title: 'ONE-THE BACKPACK GREY', price: 1990 },
        { id: 2, title: 'ONE-THE BACKPACK BLACK', price: 1990 },
        { id: 3, title: 'DALI VISION GLASSES', price: 3500 },
        { id: 4, title: 'SMC TRADING COURSE', price: 9900 },
        { id: 5, title: 'DALI HOODIE OVERSIZE', price: 4500 },
        { id: 6, title: 'TACTICAL PANTS V1', price: 5200 }
    ];

    let cart = [];

    // РЕНДЕР МАГАЗИНА
    function renderShop() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <div class="p-card">
                <div class="p-img"></div>
                <div class="p-info">
                    <div class="p-title">${p.title}</div>
                    <div class="p-price">${p.price} ₽</div>
                    <button class="p-add" onclick="addToCart(${p.id})">ADD TO BAG</button>
                </div>
            </div>
        `).join('');
    }

    // ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ЭКРАНОВ
    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        document.getElementById(`view-${viewId}`).classList.add('active');
        el.classList.add('active');
        
        tg.HapticFeedback.selectionChanged();
    }
