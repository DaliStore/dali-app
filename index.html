<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI STORE — BEAST MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #fff;
            --bg: #000;
            --gray: #111;
            --dim-text: #555;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            text-transform: uppercase;
        }

        /* ГЛАВНЫЙ ЭКРАН - HERO */
        .hero {
            height: 90vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            background: linear-gradient(0deg, #000 0%, transparent 50%), 
                        url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop') center/cover;
            position: relative;
        }

        .hero h1 {
            font-size: 60px;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 12px;
            letter-spacing: 4px;
            margin: 20px 0;
            color: var(--dim-text);
        }

        /* BENTO GRID - СЕТКА ЗВЕРЯ */
        .bento {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .bento-item {
            background: var(--gray);
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            position: relative;
            overflow: hidden;
        }

        .bento-item.full { grid-column: span 2; min-height: 250px; }

        .bento-item h3 { font-size: 14px; margin: 0; z-index: 2; }
        .bento-item .count { font-size: 40px; font-weight: 900; opacity: 0.1; position: absolute; bottom: -5px; right: 5px; }

        /* КНОПКИ */
        .cta-button {
            background: var(--accent);
            color: #000;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 14px;
            margin: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* ТОВАРЫ */
        .section-title { padding: 30px 20px 10px; font-size: 10px; letter-spacing: 3px; color: var(--dim-text); }
        
        .product-strip {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            scrollbar-width: none;
        }

        .product-card {
            min-width: 250px;
            background: var(--gray);
            border-radius: 4px;
        }

        .product-img {
            height: 300px;
            background: #1a1a1a center/cover;
            position: relative;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #fff;
            color: #000;
            padding: 4px 8px;
            font-size: 9px;
            font-weight: 900;
        }

        .product-info { padding: 15px; }

        /* NAVIGATION */
        .dock-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 10px 30px;
            border-radius: 100px;
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-link { font-size: 20px; opacity: 0.5; transition: 0.3s; }
        .nav-link.active { opacity: 1; }

    </style>
</head>
<body>

<div class="hero">
    <p>Spring / Summer 2026</p>
    <h1>DALI<br>SYSTEM</h1>
    <div class="cta-button" onclick="haptic('heavy')">СМОТРЕТЬ ДРОП</div>
</div>

<div class="section-title">Категории / Categories</div>
<div class="bento">
    <div class="bento-item" onclick="haptic('light')">
        <h3>Apparel<br>Одежда</h3>
        <span class="count">01</span>
    </div>
    <div class="bento-item" onclick="haptic('light')">
        <h3>Gear<br>Снаряжение</h3>
        <span class="count">02</span>
    </div>
    <div class="bento-item full" style="background: url('https://images.unsplash.com/photo-1552061330-3333e125170a?q=80&w=2070&auto=format&fit=crop') center/cover;" onclick="haptic('medium')">
        <h3 style="background: #000; display: inline-block; padding: 5px;">Exclusive<br>Dali Private</h3>
        <span class="count">03</span>
    </div>
</div>

<div class="section-title">Новое поступление / New Drop</div>
<div class="product-strip">
    <div class="product-card">
        <div class="product-img" style="background-image: url('https://images.unsplash.com/photo-1620331311520-246422ff83f9?q=80&w=1974&auto=format&fit=crop');">
            <span class="badge">LIMITED</span>
        </div>
        <div class="product-info">
            <div style="font-size: 14px; font-weight: 900;">ONE-THE BACKPACK</div>
            <div style="font-size: 12px; color: var(--dim-text); margin-top: 5px;">1 990 ₽</div>
        </div>
    </div>
    <div class="product-card">
        <div class="product-img" style="background-image: url('https://images.unsplash.com/photo-1511499767390-91f1976060c7?q=80&w=2080&auto=format&fit=crop');"></div>
        <div class="product-info">
            <div style="font-size: 14px; font-weight: 900;">DALI VISION GLASSES</div>
            <div style="font-size: 12px; color: var(--dim-text); margin-top: 5px;">3 500 ₽</div>
        </div>
    </div>
</div>

<div style="padding: 40px 20px; text-align: center;">
    <p style="font-size: 10px; color: #333; letter-spacing: 2px;">© 2026 DALI STORE / DISCIPLINE & STYLE</p>
</div>

<nav class="dock-nav">
    <div class="nav-link active">⬛</div>
    <div class="nav-link">⚪</div>
    <div class="nav-link">◼️</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#000000';

    function haptic(type) {
        if (type === 'light') tg.HapticFeedback.impactOccurred('light');
        if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
        if (type === 'heavy') tg.HapticFeedback.impactOccurred('heavy');
    }
</script>

</body>
</html>
