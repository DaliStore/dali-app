<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI SYSTEM — BEAST MODE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --bg: #000; --card: #0a0a0a; --dim: #555; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--accent); 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
            text-transform: uppercase;
        }

        #app { height: 100vh; display: flex; flex-direction: column; }
        
        /* КОНТЕНТНАЯ ЧАСТЬ */
        .view { 
            flex: 1; overflow-y: auto; display: none; 
            padding: 20px; padding-bottom: 100px;
            animation: fadeIn 0.2s ease;
        }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* HEADER */
        .header { text-align: center; padding: 25px 0; letter-spacing: 5px; border-bottom: 1px solid #111; }
        .header h1 { font-size: 14px; margin: 0; font-weight: 900; }

        /* МАГАЗИН - СЕТКА ТОВАРОВ */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: var(--card); border-radius: 4px; overflow: hidden; border: 1px solid #111; }
        .p-img { width: 100%; aspect-ratio: 1/1; background: #111; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-img::after { content: 'DALI'; color: #1a1a1a; font-weight: 900; font-size: 30px; letter-spacing: 10px; }
        .p-info { padding: 12px; }
        .p-title { font-size: 10px; font-weight: 700; margin-bottom: 5px; height: 25px; line-height: 1.2; overflow: hidden; }
        .p-price { font-size: 12px; color: var(--dim); margin-bottom: 12px; font-weight: 300; }
        .p-add { 
            width: 100%; border: 1px solid #333; background: transparent; 
            color: #fff; padding: 12px; font-size: 9px; font-weight: 900;
            cursor: pointer; transition: 0.2s;
        }
        .p-add:active { background: #fff; color: #000; }

        /* КОРЗИНА */
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #111;
        }
        .cart-total { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .btn-order { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 20px; font-weight: 900; font-size: 12px; border-radius: 2px;
        }

        /* ПРОФИЛЬ / ID */
        .id-card { background: var(--card); padding: 25px; border-radius: 4px; border: 1px solid #111; margin-bottom: 10px; }
        .id-label { font-size: 8px; color: var(--dim); letter-spacing: 2px; margin-bottom: 8px; }
        .id-val { font-size: 16px; font-weight: 700; letter-spacing: 1px; }

        /* НАВИГАЦИЯ */
        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: flex; border-top: 1px solid #111; z-index: 1000;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--dim); text-decoration: none; font-size: 8px; font-weight: 900;
            position: relative; transition: 0.2s;
        }
        .nav-item.active { color: #fff; }
        .nav-item.active::after { content: ''; position: absolute; top: 0; width: 30px; height: 2px; background: #fff; }
        .nav-icon { font-size: 18px; margin-bottom: 5px; }

        .badge {
            position: absolute; top: 15px; right: 25%;
            background: var(--gold); color: #000;
            font-size: 9px; font-weight: 900;
            min-width: 14px; height: 14px; border-radius: 7px;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header"><h1>DALI STORE</h1></div>

    <div id="shop" class="view active">
        <div style="margin-bottom: 30px;">
            <h2 style="font-size: 32px; font-weight: 900; margin: 0; letter-spacing: -1px;">SHOP</h2>
            <p style="font-size: 8px; color: var(--dim); letter-spacing: 3px;">SELECTED GOODS ONLY</p>
        </div>
        <div class="product-grid" id="product-container"></div>
    </div>

    <div id="cart" class="view">
        <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">BAG</h2>
        <div id="cart-list"></div>
        <div id="empty-msg" style="text-align: center; color: var(--dim); margin-top: 50px; font-size: 10px;">BAG IS EMPTY</div>
        
        <div id="order-section" class="cart-total" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span style="font-size: 10px; color: var(--dim);">TOTAL</span>
                <span id="total-price" style="font-weight: 900; font-size: 18px;">0 ₽</span>
            </div>
            <button class="btn-order" onclick="makeOrder()">COMPLETE ORDER</button>
        </div>
    </div>

    <div id="profile" class="view">
        <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">ID</h2>
        <div class="id-card">
            <div class="id-label">MEMBER NAME</div>
            <div class="id-val" id="tg-name">DALI GUEST</div>
        </div>
        <div class="id-card">
            <div class="id-label">DISCIPLINE STREAK</div>
            <div class="id-val" style="color: var(--gold);">53 DAYS IN LINE</div>
        </div>
        <div class="id-card">
            <div class="id-label">SMC TRADING STATUS</div>
            <div class="id-val">MASTER OF LIQUIDITY</div>
        </div>
        <div class="id-card" style="display: flex; justify-content: space-between;">
            <div><div class="id-label">HEIGHT</div><div class="id-val">194 CM</div></div>
            <div style="text-align: right;"><div class="id-label">WEIGHT</div><div class="id-val">78 KG</div></div>
        </div>
        <button class="btn-order" style="background: transparent; border: 1px solid #111; color: #333; margin-top: 10px;" onclick="tg.close()">DISCONNECT</button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('shop', this)">
            <span class="nav-icon">⬛</span>SHOP
        </div>
        <div class="nav-item" onclick="nav('cart', this)">
            <div id="cart-badge" class="badge">0</div>
            <span class="nav-icon">⚪</span>BAG
        </div>
        <div class="nav-item" onclick="nav('profile', this)">
            <span class="nav-icon">◼️</span>ID
        </div>
    </nav>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#000000';
    tg.backgroundColor = '#000000';

    const products = [
        { id: 1, name: 'ONE-THE BACKPACK / GREY', price: 1990 },
        { id: 2, name: 'ONE-THE BACKPACK / BLACK', price: 1990 },
        { id: 3, name: 'DALI VISION GLASSES', price: 3500 },
        { id: 4, name: 'TACTICAL GEAR SET', price: 8200 },
        { id: 5, name: 'SMC PRIVATE COURSE', price: 9900 },
        { id: 6, name: 'DISCIPLINE MASK', price: 1200 }
    ];

    let cart = [];

    // НАВИГАЦИЯ
    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    // МАГАЗИН
    const container = document.getElementById('product-container');
    products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'p-card';
        div.innerHTML = `
            <div class="p-img"></div>
            <div class="p-info">
                <div class="p-title">${p.name}</div>
                <div class="p-price">${p.price} ₽</div>
                <button class="p-add" onclick="buy(${p.id})">ADD TO BAG</button>
            </div>
        `;
        container.appendChild(div);
    });

    // КОРЗИНА
    function buy(id) {
        const p = products.find(i => i.id === id);
        cart.push(p);
        updateCart();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function updateCart() {
        const list = document.getElementById('cart-list');
        const badge = document.getElementById('cart-badge');
        const empty = document.getElementById('empty-msg');
        const orderSec = document.getElementById('order-section');
        
        badge.innerText = cart.length;
        badge.style.display = cart.length > 0 ? 'flex' : 'none';
        
        if (cart.length > 0) {
            empty.style.display = 'none';
            orderSec.style.display = 'block';
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div>
                        <div style="font-size: 10px; font-weight: 700;">${item.name}</div>
                        <div style="font-size: 10px; color: var(--dim); margin-top: 4px;">${item.price} ₽</div>
                    </div>
                    <div style="font-size: 9px; color: #ff4444; font-weight: 900;" onclick="remove(${i})">DELETE</div>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
        } else {
            empty.style.display = 'block';
            orderSec.style.display = 'none';
            list.innerHTML = '';
        }
    }

    function remove(i) {
        cart.splice(i, 1);
        updateCart();
        tg.HapticFeedback.impactOccurred('light');
    }

    function makeOrder() {
        tg.showConfirm("READY TO DISPATCH ORDER?", (confirmed) => {
            if (confirmed) {
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("ORDER RECEIVED. THE FOUNDER WILL CONTACT YOU.");
                cart = [];
                updateCart();
                nav('shop', document.querySelectorAll('.nav-item')[0]);
            }
        });
    }

    // Имя из Телеграм
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        document.getElementById('tg-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
    }
</script>
</body>
</html>
