<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI SYSTEM — LUXURY DROP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --bg: #000; --card: #0c0c0c; --dim: #555; --gold: #d4af37; --glass: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--accent); 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
            text-transform: uppercase;
        }

        #app { height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* ЭТАП 1: ГЛУБОКИЙ ЖИВОЙ ГРАДИЕНТ */
        .main-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 0;
            overflow: hidden;
        }

        /* Анимированные сферы градиента */
        .gradient-sphere {
            position: absolute;
            width: 150vw;
            height: 150vw;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        .sphere-1 {
            background: var(--gold);
            top: -50%;
            left: -50%;
            animation: move-1 15s infinite alternate ease-in-out;
        }

        .sphere-2 {
            background: #333;
            bottom: -50%;
            right: -50%;
            animation: move-2 12s infinite alternate ease-in-out;
        }

        @keyframes move-1 {
            from { transform: translate(0, 0); }
            to { transform: translate(20%, 30%); }
        }

        @keyframes move-2 {
            from { transform: translate(0, 0); }
            to { transform: translate(-20%, -30%); }
        }

        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08;
            pointer-events: none;
            z-index: 2;
        }

        .view { 
            position: relative;
            z-index: 10;
            flex: 1; overflow-y: auto; display: none; 
            padding: 20px;
        }
        .view.active { display: flex; flex-direction: column; }

        .status-badge { 
            align-self: flex-end;
            display: flex; align-items: center; gap: 6px; 
            background: rgba(0,0,0,0.5); padding: 8px 12px; 
            border-radius: 20px; border: 1px solid rgba(0,255,0,0.2);
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
        }
        .dot { width: 5px; height: 5px; background: #00ff00; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: rgba(10,10,10,0.7); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--dim); font-size: 8px; font-weight: 700; }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="app">
    <div class="main-background">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="noise"></div>
    </div>

    <div id="view-home" class="view active">
        <div class="status-badge">
            <div class="dot"></div>
            <span style="font-size: 8px; color: #00ff00; font-weight: 900;">SYSTEM ONLINE</span>
        </div>
    </div>

    <div id="view-shop" class="view"></div>
    <div id="view-cart" class="view"></div>
    <div id="view-profile" class="view"></div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchView('home', this)"><span class="nav-icon">🏠</span>HOME</div>
        <div class="nav-item" onclick="switchView('shop', this)"><span class="nav-icon">🛍️</span>SHOP</div>
        <div class="nav-item" onclick="switchView('cart', this)"><span class="nav-icon">🛒</span>BAG</div>
        <div class="nav-item" onclick="switchView('profile', this)"><span class="nav-icon">👤</span>ID</div>
    </nav>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }
</script>
</body>
</html>
