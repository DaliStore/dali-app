<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE — Loyalty Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0a0a0a; --text: #fff; --border: rgba(212, 175, 55, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; -webkit-overflow-scrolling: touch; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER С БАЛЛАМИ (КАК У БК) */
        .loyalty-header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); padding: 15px 20px; border-radius: 20px;
            border: 1px solid var(--border); margin-bottom: 25px;
        }
        .points-badge { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 50px; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* СЕТКА БЛОКОВ */
        .elite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .grid-item {
            background: linear-gradient(145deg, #111, #000);
            height: 140px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden; transition: 0.2s;
        }
        .grid-item:active { transform: scale(0.95); border-color: var(--gold); }
        .grid-item.highlight { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.05); }
        
        .item-icon { font-size: 28px; margin-bottom: 8px; filter: drop-shadow(0 0 10px var(--gold)); }
        .item-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
        .item-sub { font-size: 9px; color: #555; margin-top: 3px; }

        /* БОЛЬШАЯ КНОПКА */
        .cta-premium {
            background: #fff; color: #000; width: 100%; padding: 22px;
            border-radius: 20px; font-weight: 900; border: none;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.1);
        }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; border-top: 1px solid #111; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #444; text-transform: uppercase; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="content">
        <div id="home" class="screen active">
            <div class="loyalty-header">
                <div>
                    <div style="font-size: 10px; color: #666; text-transform: uppercase;">Мои Dali Coins</div>
                    <div style="font-size: 18px; font-weight: 800; color: #fff;">Premium Client</div>
                </div>
                <div class="points-badge"><span>👑</span> <span id="user-points">450</span></div>
            </div>

            <h2 style="font-family: 'Playfair Display'; color: var(--gold); text-align: center; margin-bottom: 20px; font-weight: 300; letter-spacing: 4px;">EXCLUSIVE</h2>

            <div class="elite-grid">
                <div class="grid-item highlight" onclick="navTo('catalog')">
                    <div class="item-icon">🎁</div>
                    <div class="item-label">Мои Купоны</div>
                    <div class="item-sub">3 доступно</div>
                </div>
                <div class="grid-item" onclick="navTo('catalog')">
                    <div class="item-icon">🔥</div>
                    <div class="item-label">Hot Drops</div>
                    <div class="item-sub">Новое поступление</div>
                </div>
                <div class="grid-item">
                    <div class="item-icon">🧥</div>
                    <div class="item-label">Одежда</div>
                    <div class="item-sub">Premium Quality</div>
                </div>
                <div class="grid-item">
                    <div class="item-icon">🕶️</div>
                    <div class="item-label">Аксессуары</div>
                    <div class="item-sub">Заверши образ</div>
                </div>
                <div class="grid-item">
                    <div class="item-icon">📊</div>
                    <div class="item-label">Трейдинг</div>
                    <div class="item-sub">Обучение от Dali</div>
                </div>
                <div class="grid-item">
                    <div class="item-icon">🤝</div>
                    <div class="item-label">Бизнес</div>
                    <div class="item-sub">Партнерская сеть</div>
                </div>
            </div>

            <button class="cta-premium" onclick="navTo('catalog')">
                <span>ОТКРЫТЬ КАТАЛОГ</span>
                <span style="font-size: 24px;">→</span>
            </button>
        </div>

        <div id="catalog" class="screen">
            <h2 style="text-align:center; color:var(--gold); margin-bottom:20px;">КАТАЛОГ</h2>
            <div id="p-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="background:var(--card); border-radius:20px; padding:15px; border:1px solid var(--border);">
                    <div style="height:120px; background:#111; border-radius:15px; margin-bottom:10px;"></div>
                    <div style="font-size:12px; font-weight:600;">Dali Signature Tee</div>
                    <div style="color:var(--gold); font-weight:800; margin-top:5px;">3 900 ₽</div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="show('home', this)"><span class="nav-icon">🏠</span>Главная</div>
        <div class="nav-item" onclick="show('catalog', this)"><span class="nav-icon">🛍️</span>Каталог</div>
        <div class="nav-item" onclick="show('cart', this)"><span class="nav-icon">🛒</span>Корзина</div>
        <div class="nav-item" onclick="show('profile', this)"><span class="nav-icon">👤</span>Профиль</div>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        function show(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function navTo(id) {
            const navItems = document.querySelectorAll('.nav-item');
            if(id === 'catalog') show('catalog', navItems[1]);
        }
    </script>
</body>
</html>
