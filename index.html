<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dali Store Mini App</title>
    <style>
        /* Общие настройки - Глубокий черный и золотой акцент */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Почти черный для глубины */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #D4AF37; /* Цвет античного золота */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Главный контейнер */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* Верхняя часть - Минималистичный Логотип */
        .header {
            text-align: center;
            margin-top: 20px;
        }

        /* Маленький аккуратный символ вместо огромной аватарки */
        .mini-logo {
            width: 60px;
            height: 60px;
            border: 1px solid #D4AF37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 24px;
            font-weight: 200;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .brand-name {
            font-size: 28px;
            letter-spacing: 8px; /* Создает "премиальный" разлет букв */
            text-transform: uppercase;
            font-weight: 300;
            margin: 0;
        }

        /* Центральная часть - Слоган */
        .hero-section {
            text-align: center;
        }

        .slogan {
            font-size: 14px;
            letter-spacing: 2px;
            color: #888; /* Приглушенный серый, чтобы золото выделялось */
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .highlight {
            color: #D4AF37;
            font-style: italic;
        }

        /* Нижняя часть - Кнопки управления */
        .footer-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .main-btn {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 16px;
            border-radius: 2px; /* Почти острые углы для строгости */
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .main-btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .secondary-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
        }

        /* Тонкая линия разделитель */
        .divider {
            width: 40px;
            height: 1px;
            background-color: #D4AF37;
            margin: 20px auto;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <div class="mini-logo">D</div> <h1 class="brand-name">Dali Store</h1>
            <div class="divider"></div>
        </div>

        <div class="hero-section">
            <p class="slogan">Премиальное качество <br>в <span class="highlight">Арзамасе</span></p>
        </div>

        <div class="footer-nav">
            <button class="main-btn" onclick="console.log('Каталог')">Смотреть каталог</button>
            <button class="main-btn" style="border-color: #333; color: #888;">Мои заказы</button>
            <a href="#" class="secondary-btn">Поддержка / Контакты</a>
        </div>

    </div>

</body>
</html>
