<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dali Store — Engine Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0a0a0a; --text: #fff; --border: rgba(212, 175, 55, 0.15); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; -webkit-overflow-scrolling: touch; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .app-header { padding: 15px; text-align: center; border-bottom: 0.5px solid #111; background: var(--bg); position: sticky; top:0; z-index:100; }
        .app-header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 16px; letter-spacing: 3px; }

        /* ИНФО КАРТОЧКИ */
        .info-card { background: var(--card); border-radius: 22px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-num { display: block; color: var(--gold); font-weight: 800; font-size: 18px; }
        .stat-lab { font-size: 9px; color: #555; text-transform: uppercase; }

        /* КАТАЛОГ ТОВАРОВ */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .p-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .p-img { height: 140px; background: #111 center/cover; width: 100%; }
        .p-desc { padding: 12px; }
        .p-price { color: var(--gold); font-weight: 800; font-size: 15px; margin-top: 5px; }

        /* АДМИН ПАНЕЛЬ */
        .admin-block { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px; }
        .admin-label { font-size: 10px; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .admin-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-family: inherit; }
        .save-btn { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #444; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .settings-btn { position: absolute; top: 15px; right: 15px; font-size: 18px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="app-header"><h1>DALI STORE</h1></div>

<div class="content" id="main-scroll">
    
    <div id="home" class="screen active">
        <div class="info-card">
            <div style="font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 10px;">DALI ECOSYSTEM</div>
            <p id="d-main-desc" style="font-size: 11px; color: #888; line-height: 1.6;">Загрузка описания...</p>
            <div class="stats-row">
                <div class="stat-item"><span class="stat-num" id="d-stat-clients">0</span><span class="stat-lab">Клиентов</span></div>
                <div class="stat-item"><span class="stat-num" id="d-stat-countries">0</span><span class="stat-lab">Стран</span></div>
                <div class="stat-item"><span class="stat-num">24/7</span><span class="stat-lab">Офис</span></div>
            </div>
        </div>
        <div class="info-card" id="d-promo-card">
            <div style="font-weight: 800; font-size: 12px; color: var(--gold);">NEW ARRIVAL</div>
            <p style="font-size: 10px; color: #555; margin-top: 5px;">Обновление коллекции доступно в каталоге</p>
        </div>
    </div>

    <div id="catalog" class="screen">
        <h2 style="font-size: 14px; letter-spacing: 2px; color: var(--gold); margin-bottom: 15px;">КАТАЛОГ</h2>
        <div class="product-grid">
            <div class="p-card">
                <div id="d-p1-img" class="p-img"></div>
                <div class="p-desc">
                    <div id="d-p1-title" style="font-size: 11px; font-weight: 600;">Item 1</div>
                    <div id="d-p1-price" class="p-price">0 ₽</div>
                </div>
            </div>
            <div class="p-card">
                <div id="d-p2-img" class="p-img"></div>
                <div class="p-desc">
                    <div id="d-p2-title" style="font-size: 11px; font-weight: 600;">Item 2</div>
                    <div id="d-p2-price" class="p-price">0 ₽</div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile" class="screen">
        <div class="info-card" style="text-align: center; padding: 40px 20px;">
            <div class="settings-btn" onclick="show('admin')">⚙️</div>
            <div style="width: 70px; height: 70px; background: #111; border-radius: 50%; margin: 0 auto 15px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px;">👤</div>
            <div style="font-weight: 800; font-size: 18px;">DALI PARTNER</div>
        </div>
        <div class="info-card">🎓 ОБУЧЕНИЕ</div>
        <div class="info-card">👥 ПАРТНЕРКА</div>
        <div class="info-card">📺 МЕДИА</div>
    </div>

    <div id="admin" class="screen">
        <h2 style="color: var(--gold); margin-bottom: 20px;">ADMIN PANEL</h2>
        
        <div class="admin-block">
            <span class="admin-label">Главный экран</span>
            <input type="text" id="adm-clients" class="admin-input" placeholder="Кол-во клиентов">
            <input type="text" id="adm-countries" class="admin-input" placeholder="Кол-во стран">
            <textarea id="adm-desc" class="admin-input" placeholder="Описание бренда" rows="3"></textarea>
        </div>

        <div class="admin-block">
            <span class="admin-label">Товар 1</span>
            <input type="text" id="adm-p1-title" class="admin-input" placeholder="Название">
            <input type="text" id="adm-p1-price" class="admin-input" placeholder="Цена">
            <input type="text" id="adm-p1-img" class="admin-input" placeholder="Ссылка на фото">
        </div>

        <div class="admin-block">
            <span class="admin-label">Товар 2</span>
            <input type="text" id="adm-p2-title" class="admin-input" placeholder="Название">
            <input type="text" id="adm-p2-price" class="admin-input" placeholder="Цена">
            <input type="text" id="adm-p2-img" class="admin-input" placeholder="Ссылка на фото">
        </div>

        <button class="save-btn" onclick="saveAll()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
        <div style="height: 50px;"></div>
    </div>

</div>

<nav class="nav">
    <div class="nav-item active" onclick="show('home', this)"><span class="nav-icon">🏠</span>Главная</div>
    <div class="nav-item" onclick="show('catalog', this)"><span class="nav-icon">🛍️</span>Каталог</div>
    <div class="nav-item" onclick="show('profile', this)"><span class="nav-icon">👤</span>Профиль</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Начальные данные (если памяти нет)
    const defaultData = {
        clients: "750+",
        countries: "12",
        desc: "Dali Store — это объединение моды, технологий и бизнеса. Мы создаем стиль будущего.",
        p1_title: "Signature Gold Tee", p1_price: "4 500 ₽", p1_img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400",
        p2_title: "Elite Black Hoodie", p2_price: "8 900 ₽", p2_img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400"
    };

    function loadData() {
        const data = JSON.parse(localStorage.getItem('dali_db')) || defaultData;
        
        // Рендер на страницы
        document.getElementById('d-stat-clients').innerText = data.clients;
        document.getElementById('d-stat-countries').innerText = data.countries;
        document.getElementById('d-main-desc').innerText = data.desc;
        
        document.getElementById('d-p1-title').innerText = data.p1_title;
        document.getElementById('d-p1-price').innerText = data.p1_price;
        document.getElementById('d-p1-img').style.backgroundImage = `url(${data.p1_img})`;

        document.getElementById('d-p2-title').innerText = data.p2_title;
        document.getElementById('d-p2-price').innerText = data.p2_price;
        document.getElementById('d-p2-img').style.backgroundImage = `url(${data.p2_img})`;

        // Заполнение полей в админке
        document.getElementById('adm-clients').value = data.clients;
        document.getElementById('adm-countries').value = data.countries;
        document.getElementById('adm-desc').value = data.desc;
        document.getElementById('adm-p1-title').value = data.p1_title;
        document.getElementById('adm-p1-price').value = data.p1_price;
        document.getElementById('adm-p1-img').value = data.p1_img;
        document.getElementById('adm-p2-title').value = data.p2_title;
        document.getElementById('adm-p2-price').value = data.p2_price;
        document.getElementById('adm-p2-img').value = data.p2_img;
    }

    function saveAll() {
        const newData = {
            clients: document.getElementById('adm-clients').value,
            countries: document.getElementById('adm-countries').value,
            desc: document.getElementById('adm-desc').value,
            p1_title: document.getElementById('adm-p1-title').value,
            p1_price: document.getElementById('adm-p1-price').value,
            p1_img: document.getElementById('adm-p1-img').value,
            p2_title: document.getElementById('adm-p2-title').value,
            p2_price: document.getElementById('adm-p2-price').value,
            p2_img: document.getElementById('adm-p2-img').value
        };
        localStorage.setItem('dali_db', JSON.stringify(newData));
        loadData();
        tg.HapticFeedback.notificationOccurred('success');
        show('home', document.querySelectorAll('.nav-item')[0]);
    }

    function show(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
        document.getElementById('main-scroll').scrollTo(0,0);
    }

    loadData();
</script>
</body>
</html>
