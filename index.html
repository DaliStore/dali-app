<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALI ESSENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }

        /* ФОН */
        .main-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .gradient-sphere { position: absolute; width: 140vw; height: 140vw; border-radius: 50%; filter: blur(80px); opacity: 0.1; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); animation: slowMove 20s infinite alternate; }
        @keyframes slowMove { from { transform: translate(-20%, -10%); } to { transform: translate(10%, 15%); } }

        /* СТРАНИЦЫ */
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 0 16px; z-index: 10; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: flex; }

        .hero { padding-top: 6vh; padding-bottom: 3vh; text-align: center; }
        .dali-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; position: relative; }

        /* СЕТКА ТОВАРОВ */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; padding: 10px; transition: 0.2s; }
        .product-image { width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 10px; }
        .product-price { font-size: 13px; font-weight: 900; color: var(--gold); }

        /* BOTTOM SHEET (ДЕТАЛИ ТОВАРА) */
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; opacity: 0; transition: 0.3s; }
        .product-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: #0a0a0a; border-top: 1px solid var(--border);
            border-radius: 30px 30px 0 0; z-index: 2001; padding: 25px;
            transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            backdrop-filter: blur(25px);
        }
        .sheet-active .sheet-overlay { display: block; opacity: 1; }
        .sheet-active .product-sheet { bottom: 0; }

        .sheet-handle { width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }
        .sheet-content { display: flex; gap: 20px; align-items: flex-start; }
        .sheet-img { width: 100px; height: 100px; background: #111; border-radius: 15px; flex-shrink: 0; }
        .sheet-info { flex: 1; }
        .sheet-title { font-size: 16px; font-weight: 900; margin-bottom: 5px; }
        .sheet-desc { font-size: 10px; color: #666; line-height: 1.4; margin-bottom: 15px; }

        .add-btn { 
            width: 100%; background: var(--gold); color: #000; font-weight: 900; 
            height: 50px; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; letter-spacing: 1px; margin-top: 10px;
        }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 25px; left: 16px; right: 16px; height: 60px; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 7px; font-weight: 800; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body id="body-tag">

<div class="main-background"><div class="gradient-sphere"></div></div>

<div id="home" class="page active">
    <div class="hero"><h1 class="dali-title">DALI ESSENCE</h1></div>
    <div style="margin-top: 200px; text-align: center; color: #222; font-size: 10px;">HOME_DASHBOARD_READY</div>
    <div style="margin-top: auto; padding-bottom: 20px;">
        <div style="background: var(--gold); color:#000; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900;" onclick="switchPage('catalog')">ENTER CATALOG</div>
    </div>
</div>

<div id="catalog" class="page">
    <div class="hero"><h1 class="dali-title">CATALOG</h1></div>
    <div class="product-grid">
        <div class="product-card" onclick="openSheet('DALI HOODIE', '7,500 ₽', 'Premium heavy cotton, oversize fit, essence black embroidery.')">
            <div class="product-image">IMG</div>
            <div style="font-size: 10px; font-weight: 600;">DALI HOODIE</div>
            <div class="product-price">7,500 ₽</div>
        </div>
        <div class="product-card" onclick="openSheet('DALI T-SHIRT', '3,200 ₽', 'Limited edition white tee. 100% organic cotton.')">
            <div class="product-image">IMG</div>
            <div style="font-size: 10px; font-weight: 600;">DALI T-SHIRT</div>
            <div class="product-price">3,200 ₽</div>
        </div>
    </div>
</div>

<div class="sheet-overlay" onclick="closeSheet()"></div>
<div class="product-sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
        <div class="sheet-img"></div>
        <div class="sheet-info">
            <div class="sheet-title" id="stitle">PRODUCT NAME</div>
            <div class="sheet-price" id="sprice" style="color: var(--gold); font-weight: 900; margin-bottom: 5px;">0 ₽</div>
            <div class="sheet-desc" id="sdesc">Description goes here...</div>
        </div>
    </div>
    <div class="add-btn" onclick="addToBag()">ADD TO BAG</div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchPage('home')">HOME</div>
    <div class="nav-item" onclick="switchPage('catalog')">CATALOG</div>
    <div class="nav-item">ORDERS</div>
    <div class="nav-item">PROFILE</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function openSheet(name, price, desc) {
        document.getElementById('stitle').innerText = name;
        document.getElementById('sprice').innerText = price;
        document.getElementById('sdesc').innerText = desc;
        document.getElementById('body-tag').classList.add('sheet-active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeSheet() {
        document.getElementById('body-tag').classList.remove('sheet-active');
    }

    function addToBag() {
        tg.HapticFeedback.notificationOccurred('success');
        closeSheet();
        // Тут логика добавления в корзину
    }

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }
</script>
</body>
</html>
